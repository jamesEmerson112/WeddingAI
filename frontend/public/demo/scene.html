<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Placeholder scene</title>
    <style>
      /* Self-contained placeholder shown in the viewer iframe until the GPU
         worker produces a real Gaussian-splat artifact (see ROADMAP Phase 1).
         Everything is inline so this file renders standalone with no assets. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0a0a12;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }

      .scene {
        position: relative;
        width: 100%;
        height: 100%;
      }

      /* Soft, blurred, colorful dots that slowly drift so the iframe is
         visibly "alive". `screen` blending lets them glow where they overlap. */
      .dot {
        position: absolute;
        border-radius: 50%;
        filter: blur(28px);
        opacity: 0.75;
        mix-blend-mode: screen;
        will-change: transform;
      }

      .dot.a {
        width: 220px;
        height: 220px;
        background: #ff4d6d;
        top: 20%;
        left: 15%;
        animation: drift1 13s ease-in-out infinite;
      }
      .dot.b {
        width: 260px;
        height: 260px;
        background: #4d79ff;
        top: 45%;
        left: 55%;
        animation: drift2 17s ease-in-out infinite;
      }
      .dot.c {
        width: 180px;
        height: 180px;
        background: #4dffb8;
        top: 60%;
        left: 25%;
        animation: drift1 11s ease-in-out infinite reverse;
      }
      .dot.d {
        width: 200px;
        height: 200px;
        background: #ffd24d;
        top: 15%;
        left: 65%;
        animation: drift2 15s ease-in-out infinite reverse;
      }
      .dot.e {
        width: 150px;
        height: 150px;
        background: #c04dff;
        top: 70%;
        left: 70%;
        animation: drift1 19s ease-in-out infinite;
      }

      @keyframes drift1 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(60px, -40px) scale(1.15);
        }
      }
      @keyframes drift2 {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-70px, 50px) scale(0.9);
        }
      }

      .msg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      .msg p {
        max-width: 32rem;
        margin: 0;
        color: #e6e6f0;
        font-size: 1rem;
        line-height: 1.6;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="dot a"></div>
      <div class="dot b"></div>
      <div class="dot c"></div>
      <div class="dot d"></div>
      <div class="dot e"></div>
      <div class="msg">
        <p>
          Placeholder Gaussian Splat scene — the real artifact is produced by the
          GPU worker (ROADMAP Phase 1)
        </p>
      </div>
    </div>
  </body>
</html>
