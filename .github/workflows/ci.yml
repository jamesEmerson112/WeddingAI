name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Backend: Rust / Axum. Runs the same checks you run locally before pushing.
  # Compiling still needs no DATABASE_URL — the backend uses sqlx runtime
  # functions, not the compile-time query! macros. But `cargo test` now does:
  # the DB moved from SQLite to Postgres, and Postgres has no in-process
  # equivalent of `sqlite::memory:`, so the tests need a real server.
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weddingai_test
        ports:
          - 5432:5432
        # Without this the job can start before Postgres accepts connections.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/weddingai_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint (warnings are errors)
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  # ---------------------------------------------------------------------------
  # Frontend: Next.js / TypeScript. Clean install then production build.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
