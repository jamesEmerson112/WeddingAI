name: CI

on:
  push:
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Backend: Rust / Axum. Runs the same checks you run locally before pushing.
  # No DATABASE_URL is needed because the backend uses sqlx runtime functions
  # (not the compile-time query! macros), so nothing here touches a database.
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint (warnings are errors)
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  # ---------------------------------------------------------------------------
  # Frontend: Next.js / TypeScript. Clean install then production build.
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
